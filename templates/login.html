{% extends 'base.html' %}

{% block title %}Login - Leave Management System{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <img src="{{ url_for('static', filename='images/acebiz-logo.png') }}" alt="Acebiz" style="height: 60px; margin-bottom: 10px;">
            <h1>Leave Portal</h1>
            <p>Sign in to your account</p>
        </div>

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="login_input">
                    <i class="fas fa-user"></i> Username or Email
                </label>
                <input type="text" id="login_input" name="login_input" required placeholder="Enter your username or email">
            </div>

            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i> Password
                </label>
                <div class="password-input-wrapper" style="position: relative;">
                    <input type="password" id="password" name="password" required placeholder="Enter your password" style="padding-right: 40px;">
                    <button type="button" class="toggle-password" onclick="togglePassword()" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted);">
                        <i class="fas fa-eye" id="toggleIcon"></i>
                    </button>
                </div>
            </div>

            <div class="form-group" style="text-align: right; margin-bottom: 1rem;">
                <a href="{{ url_for('forgot_password') }}" class="forgot-password-link">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
        </div>
    </div>
</div>

<script>
function togglePassword() {
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.getElementById('toggleIcon');

    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
    } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
    }
}
</script>
{% endblock %}
