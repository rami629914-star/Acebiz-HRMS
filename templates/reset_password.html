{% extends 'base.html' %}

{% block title %}Reset Password - Leave Management System{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <img src="{{ url_for('static', filename='images/acebiz-logo.png') }}" alt="Acebiz" style="height: 60px; margin-bottom: 10px;">
            <h1>Reset Password</h1>
            <p>Create a new password for your account</p>
        </div>

        <form method="POST" class="auth-form" id="resetForm">
            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i> New Password
                </label>
                <input type="password" id="password" name="password" required
                       placeholder="Enter new password" minlength="6">
            </div>

            <div class="form-group">
                <label for="confirm_password">
                    <i class="fas fa-lock"></i> Confirm Password
                </label>
                <input type="password" id="confirm_password" name="confirm_password" required
                       placeholder="Confirm new password" minlength="6">
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-save"></i> Reset Password
            </button>
        </form>

        <div class="auth-footer">
            <p><a href="{{ url_for('login') }}">Back to Login</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('resetForm').addEventListener('submit', function(e) {
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm_password').value;

        if (password !== confirmPassword) {
            e.preventDefault();
            alert('Passwords do not match!');
        }
    });
</script>
{% endblock %}
