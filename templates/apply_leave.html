{% extends 'base.html' %}

{% block title %}Apply Leave - Leave Management System{% endblock %}

{% block content %}
<div class="page-container">
    <div class="page-header">
        <h1><i class="fas fa-plus-circle"></i> Apply for Leave</h1>
        <p>Submit a new leave request</p>
    </div>

    <div class="form-card">
        <form method="POST" class="leave-form" id="leaveForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="leave_type">
                        <i class="fas fa-tag"></i> Leave Type
                    </label>
                    <select id="leave_type" name="leave_type" required>
                        <option value="">Select Leave Type</option>
                        <option value="annual">Annual Leave</option>
                        <option value="sick">Sick Leave</option>
                        <option value="lwp">Leave Without Pay</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="start_date">
                        <i class="fas fa-calendar-alt"></i> Start Date
                    </label>
                    <input type="date" id="start_date" name="start_date" required>
                </div>

                <div class="form-group">
                    <label for="end_date">
                        <i class="fas fa-calendar-alt"></i> End Date
                    </label>
                    <input type="date" id="end_date" name="end_date" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="hours">
                        <i class="fas fa-clock"></i> Leave Hours
                    </label>
                    <input type="number" id="hours" name="hours" step="0.01" min="0.01" required placeholder="Enter leave hours (e.g. 9.2)">
                </div>
            </div>

            <div class="form-group" id="daysInfo" style="display: none;">
                <div class="info-box">
                    <i class="fas fa-info-circle"></i>
                    <span>Duration: <strong id="totalDays">0</strong> day(s) | Hours: <strong id="displayHours">0</strong></span>
                </div>
            </div>

            <div class="form-group">
                <label for="reason">
                    <i class="fas fa-comment-alt"></i> Reason
                </label>
                <textarea id="reason" name="reason" rows="4" required placeholder="Please provide a reason for your leave request..."></textarea>
            </div>

            <div class="form-actions">
                <a href="{{ url_for('dashboard') }}" class="btn btn-outline">
                    <i class="fas fa-times"></i> Cancel
                </a>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-paper-plane"></i> Submit Application
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const startDate = document.getElementById('start_date');
    const endDate = document.getElementById('end_date');
    const hoursInput = document.getElementById('hours');
    const daysInfo = document.getElementById('daysInfo');
    const totalDays = document.getElementById('totalDays');
    const displayHours = document.getElementById('displayHours');

    // Set minimum date to today
    const today = new Date().toISOString().split('T')[0];
    startDate.setAttribute('min', today);
    endDate.setAttribute('min', today);

    function updateInfo() {
        if (startDate.value && endDate.value) {
            const start = new Date(startDate.value);
            const end = new Date(endDate.value);
            const diffTime = end - start;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;

            if (diffDays > 0) {
                totalDays.textContent = diffDays;
                displayHours.textContent = hoursInput.value || '0';
                daysInfo.style.display = 'block';
            } else {
                daysInfo.style.display = 'none';
            }
        }
    }

    startDate.addEventListener('change', function() {
        endDate.setAttribute('min', this.value);
        updateInfo();
    });

    endDate.addEventListener('change', updateInfo);
    hoursInput.addEventListener('input', function() {
        displayHours.textContent = this.value || '0';
        updateInfo();
    });
</script>
{% endblock %}
